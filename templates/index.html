<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminder App</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="container">

  <h1>&#9200; Reminders</h1>
  <p class="subtitle">Set a reminder and get alerted on your phone via ntfy</p>

  <div class="ntfy-banner">
    &#128241; Phone alerts go to ntfy topic: <strong>{{ ntfy_topic }}</strong><br>
    Install the <strong>ntfy</strong> app and subscribe to this topic to receive notifications.
  </div>

  <!-- New reminder form -->
  <div class="card">
    <h2 class="card__title">New Reminder</h2>
    <form id="reminderForm" novalidate>

      <div class="form-row">
        <div>
          <label class="form-field__label" for="eventName">Event name</label>
          <input type="text" id="eventName" name="eventName"
                 placeholder="Team meeting" required />
        </div>
      </div>

      <div class="form-row form-row--two">
        <div>
          <label class="form-field__label" for="eventTime">Event date &amp; time</label>
          <input type="datetime-local" id="eventTime" name="eventTime" required />
        </div>
        <div>
          <label class="form-field__label">Alert me before</label>
          <div class="form-field__alert-row">
            <input type="number" id="alertAmount" name="alertAmount"
                   min="1" value="15" required />
            <select id="alertUnit" name="alertUnit">
              <option value="1">min</option>
              <option value="60">hrs</option>
              <option value="1440">days</option>
            </select>
          </div>
        </div>
      </div>

      <p class="form-error" hidden></p>
      <button type="submit" class="btn btn--primary">Add Reminder</button>

    </form>
  </div>

  <!-- Upcoming reminders -->
  <div class="card">
    <h2 class="card__title">Upcoming Reminders</h2>
    <div class="reminder-list" id="reminderList"></div>
  </div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
